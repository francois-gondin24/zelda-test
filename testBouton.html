<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testBouton</title>
    <script src="https://kit.fontawesome.com/63f602bab9.js" crossorigin="anonymous"></script>
</head>
<style>
.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input {
  opacity: 0; width: 0; height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc;
  transition: .4s;
  border-radius: 34px;
}

/* Le cercle blanc qui bouge */
.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
  z-index: 1; /* Pour être derrière les icônes */
}

/* Style commun aux icônes */
.slider i {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  transition: .4s;
  font-size: 14px;
  z-index: 2; /* Pour être au-dessus du cercle blanc */
}

/* Position du soleil (claire) */
.icon-sun {
  left: 10px;
  color: #f39c12;
}

/* Position de la lune (cachée au début) */
.icon-moon {
  right: 10px;
  color: #f1c40f;
  opacity: 0;
}

/* --- ETATS ACTIFS --- */

input:checked + .slider {
  background-color: #2c3e50;
}

/* Déplacement du cercle blanc */
input:checked + .slider:before {
  transform: translateX(26px);
}

/* Gestion de l'apparition/disparition des icônes */
input:checked + .slider .icon-sun {
  opacity: 0;
}

input:checked + .slider .icon-moon {
  opacity: 1;
}
/* style de la barre de recherche */


.search-container {
    display: flex;
    align-items: center;
    background: #ffffff; /* Fond blanc */
    border: 1px solid #ddd; /* Une bordure très fine grise */
    border-radius: 8px; /* Des coins légèrement arrondis */
    padding: 8px 12px;
    width: 250px;
    font-family: 'Georgia', serif;
}

.search-container i {
    color: #888; /* Couleur de l'icône loupe */
    margin-right: 10px;
    font-family: 'Georgia', serif;
}

.search-container input {
    border: none; /* ON ENLÈVE LA BARRE LAIDE ICI */
    outline: none; /* Enlève le contour bleu quand on clique */
    width: 100%;
    font-size: 14px;
    background: transparent;
    font-family: 'Georgia', serif;
}

/* Petit effet quand on survole la barre */
.search-container:hover {
    border-color: #bbb;
}
</style>

<body>
<label class="switch">
  <input type="checkbox">
  <span class="slider">
    <i class="fa-solid fa-sun icon-sun"></i>
    <i class="fa-solid fa-moon icon-moon"></i>
  </span>
</label>
<div class="search-container">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Rechercher...">
</div>
</body>
</html>
